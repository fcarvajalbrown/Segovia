publish = false
push = true
tag = true
tag-name = "v{{version}}"
tag-message = "Release {{version}}"
pre-release-commit-message = "chore(release): v{{version}}"

pre-release-replacements = [
  { file = "CHANGELOG.md", search = "## \\[Unreleased\\]", replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}", exactly = 1 },
  { file = "CITATION.cff", search = "^version: .+$", replace = "version: {{version}}", exactly = 1 },
  { file = "CITATION.cff", search = "^date-released: .+$", replace = "date-released: {{date}}", exactly = 1 },
  { file = "ROADMAP.md", search = "\\*\\*Version:\\*\\* `[^`]+`", replace = "**Version:** `{{version}}`", exactly = 1 },
]
