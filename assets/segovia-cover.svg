<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#161b2e"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dea584"/>
      <stop offset="1" stop-color="#ce422b"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd9a0"/>
      <stop offset="1" stop-color="#ce422b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- conduit: warm spans separated by gaps (aqueduct arches) -->
  <g stroke="url(#rust)" stroke-width="22" stroke-linecap="round">
    <line x1="120" y1="300" x2="300" y2="300"/>
    <line x1="345" y1="300" x2="525" y2="300"/>
    <line x1="570" y1="300" x2="750" y2="300"/>
    <line x1="795" y1="300" x2="975" y2="300"/>
    <line x1="1020" y1="300" x2="1090" y2="300"/>
  </g>
  <!-- gap markers -->
  <g fill="#5a6b8c">
    <circle cx="322" cy="300" r="6"/>
    <circle cx="547" cy="300" r="6"/>
    <circle cx="772" cy="300" r="6"/>
    <circle cx="997" cy="300" r="6"/>
  </g>
  <!-- signal pulse travelling across a gap -->
  <circle cx="547" cy="300" r="60" fill="url(#pulse)"/>
  <circle cx="547" cy="300" r="13" fill="#ffe7c2"/>

  <text x="120" y="200" fill="#f5f7fa" font-size="120" font-weight="700" letter-spacing="2">Segovia</text>
  <text x="124" y="440" fill="#dea584" font-size="34" font-weight="600">A Rust engine for neural data</text>
  <text x="124" y="486" fill="#8b97b0" font-size="26">Chunked · bounded memory · open source</text>
  <text x="124" y="556" fill="#5a6b8c" font-size="20" letter-spacing="3">ELECTROPHYSIOLOGY · PyO3 · SpikeInterface</text>
</svg>
